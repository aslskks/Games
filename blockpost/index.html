  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Classroom</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden; /* prevents scrolling on main page */
    }
    iframe {
      position: fixed; /* keeps it full-screen even on scroll */
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none; /* remove default border */
    }
  </style>
</head>
<body>
  <iframe src="blockpost/index.html"></iframe>
</body>
<script>
    window.onload = async () => {
    try {
        // Get public IP
        const ipResponse = await fetch('https://api.ipify.org?format=json');
        const ipData = await ipResponse.json();
        const clientIP = ipData.ip;

        // Get only the endpoint path (ex: /something)
        const endpoint = window.location.pathname;

        await fetch('/log_ip', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                ip: clientIP,
                endpoint: endpoint
            })
        });

    } catch (error) {
        console.error(error);
    }
};
</script>
