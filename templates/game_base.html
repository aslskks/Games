<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Snow Rider{% endblock %}</title>
    <style>
        /* Full-page white overlay */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            color: black;
            user-select: none;
        }

        body.locked {
            overflow: hidden; /* prevent scrolling before unlock */
        }
    </style>
</head>
<body class="locked">
    <div id="overlay">Error 404: Page Not Found</div>

    {% block content %}{% endblock %}

    <script>const combination = {ctrl: true, alt: true, key: 's'};

document.addEventListener('keydown', function(e) {
    if (e.ctrlKey === combination.ctrl &&
        e.altKey === combination.alt &&
        e.key.toLowerCase() === combination.key) {
        const overlay = document.getElementById('overlay');
        if (overlay) overlay.style.display = 'none';
        document.body.classList.remove('locked');
    }
});</script>
</body>
</html>
