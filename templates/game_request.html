<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Request a Game</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<style>
  body {
    font-family: 'Roboto', sans-serif;
    background: #1e1e2f;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem;
  }

  h1 {
    color: #ff7d00;
    margin-bottom: 1rem;
  }

  p {
    color: #ccc;
    margin-bottom: 2rem;
    text-align: center;
    max-width: 400px;
  }

  form {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    width: 100%;
    max-width: 400px;
  }

  input, textarea {
    padding: 0.5rem 0.7rem;
    border-radius: 6px;
    border: none;
    outline: none;
    font-family: 'Roboto', sans-serif;
  }

  button {
    padding: 0.7rem;
    border: none;
    border-radius: 6px;
    background: #ff7d00;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: background 0.3s;
  }

  button:hover {
    background: #ff3d00;
  }

  a {
    margin-top: 1rem;
    text-align: center;
    color: #ff7d00;
    text-decoration: underline;
  }
</style>
</head>
<body>

<h1>Request a Game</h1>

<form method="POST" action="/request-game">
  <input type="text" name="game_name" placeholder="Game Name" required>
  <input type="text" name="game_link" placeholder="Game Link (optional)">
  <textarea name="message" rows="3" placeholder="Additional info or features"></textarea>
  <button type="submit">Submit Request</button>
</form>

<a href="/">← Back to Games</a>
<script src="{{ url_for('static', filename='ip.js')}}"></script>

</body>
</html>
