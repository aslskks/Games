{% extends "game_base.html" %}

{% block title %}Classroom{% endblock %}

{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Account</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="login-container">

<div class="login-card">

<div class="login-header">
<h2>Create Account</h2>
<p>Sign up to get started</p>
</div>

<form id="registerForm" action="/register" method="POST">
<input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
<input type="hidden" name="ip" id="ip">
<!-- NAME -->
<div class="form-group">
<div class="input-wrapper">
<input type="text" id="name" name="name" required>
<label for="name">Full Name</label>
</div>
<span class="error-message" id="nameError"></span>
</div>

<div class="form-group">
<div class="input-wrapper">
<input type="user" id="user" name="user" required>
<label for="user">User</label>
</div>
<span class="error-message" id="userError"></span>
</div>

<!-- EMAIL -->
<div class="form-group">
<div class="input-wrapper">
<input type="email" id="email" name="email" required>
<label for="email">Email</label>
</div>
<span class="error-message" id="emailError"></span>
</div>

<!-- PASSWORD -->
<div class="form-group">
<div class="input-wrapper password-wrapper">
<input type="password" id="password" name="password" required>
<label for="password">Password</label>

<button type="button" class="password-toggle" id="passwordToggle">
<span class="eye-icon"></span>
</button>

</div>
<span class="error-message" id="passwordError"></span>
</div>

<!-- CONFIRM PASSWORD -->
<div class="form-group">
<div class="input-wrapper password-wrapper">

<input type="password" id="confirmPassword" name="confirmPassword" required>
<label for="confirmPassword">Confirm Password</label>

<button type="button" class="password-toggle" id="confirmPasswordToggle">
<span class="eye-icon"></span>
</button>

</div>
<span class="error-message" id="confirmPasswordError"></span>
</div>

<!-- REGISTER BUTTON -->
<button type="submit" class="login-btn">

<span class="btn-text">Create Account</span>

<div class="btn-loader"></div>

</button>

</form>

<div class="signup-link">
<p>Already have an account? <a href="/login">Sign in</a></p>
</div>

</div>
</div>

<script src="{{ url_for('static', filename='form-utils.js') }}"></script>
<script src="{{ url_for('static', filename='register.js') }}"></script>
<script src="{{url_for('static', filename='ip.js')}}"></script>
</body>
</html>
{% endblock %}
