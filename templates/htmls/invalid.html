<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invalid Reset Link</title>
<link rel="stylesheet" href="{{url_for('static', filename="style.css")}}">
</head>

<body>

<div class="login-container">
<div class="login-card">

<div class="login-header">
<h2>Invalid or Expired Link</h2>
<p>This password reset link is no longer valid.</p>
</div>

<div class="success-message show">

<div class="success-icon" style="background:#ef4444;">
✕
</div>

<h3>Reset Link Invalid</h3>
<p>
The password reset link may have expired or already been used.
Please request a new password reset.
</p>

</div>

<a href="/forgot">
<button class="login-btn">
<span class="btn-text">Request New Reset Link</span>
</button>
</a>

<div class="signup-link">
<p>Back to <a href="/login">Login</a></p>
</div>

</div>
</div>

</body>
</html>
