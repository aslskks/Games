<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reset Your Password</title>
</head>
<body style="margin:0; padding:0; font-family: Arial, sans-serif; background-color:#f4f4f4;">
  <table align="center" width="100%" cellpadding="0" cellspacing="0" style="max-width:600px; margin:20px auto; background-color:#ffffff; border-radius:8px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,0.1);">
    <tr>
      <td style="padding:20px; text-align:center; background-color:#4CAF50; color:#ffffff;">
        <h1 style="margin:0; font-size:24px;">Reset Your Password</h1>
      </td>
    </tr>
    <tr>
      <td style="padding:30px; color:#333333;">
        <p>Hello,</p>
        <p>We received a request to reset your password. Click the button below to reset it:</p>
        <p style="text-align:center; margin:30px 0;">
          <a href="{{RESET_LINK}}" target="_blank" style="background-color:#4CAF50; color:#ffffff; padding:12px 24px; text-decoration:none; border-radius:4px; font-weight:bold;">Reset Password</a>
        </p>
        <p>If you did not request this, please ignore this email.</p>
        <p>Thanks,<br>Your App Team</p>
      </td>
    </tr>
    <tr>
      <td style="padding:15px; text-align:center; font-size:12px; color:#777777; background-color:#f4f4f4;">
        &copy; 2026 Your App. All rights reserved.
      </td>
    </tr>
  </table>
</body>
</html>
