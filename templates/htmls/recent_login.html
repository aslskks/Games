<!DOCTYPE html>
    <html lang="en">
    <head>
    <meta charset="UTF-8">
    <title>Recent Login Alert</title>
    </head>
    <body style="margin:0; padding:0; font-family: Arial, sans-serif; background-color:#f4f4f4;">
    <table align="center" width="100%" cellpadding="0" cellspacing="0" style="max-width:600px; margin:20px auto; background-color:#ffffff; border-radius:8px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,0.1);">
        <tr>
        <td style="padding:20px; text-align:center; background-color:#2196F3; color:#ffffff;">
            <h1 style="margin:0; font-size:24px;">Recent Login Alert</h1>
        </td>
        </tr>
        <tr>
        <td style="padding:30px; color:#333333;">
            <p>Hello,</p>
            <p>Your account was recently accessed. Details of the login:</p>
            <ul style="padding-left:20px;">
            <li><strong>Time:</strong> {{LOGIN_TIME}}</li>
            <li><strong>IP Address:</strong> {{IP_ADDRESS}}</li>
            <li><strong>Approx. Location:</strong> {{LOCATION}}</li>
        </td>
        </tr>
        <tr>
        </tr>
    </table>
    </body>
    </html>
